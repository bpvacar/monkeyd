<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f2f8"/>
    </linearGradient>
    <linearGradient id="straw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d078"/>
      <stop offset="1" stop-color="#d8ac4e"/>
    </linearGradient>
    <linearGradient id="brim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c463"/>
      <stop offset="1" stop-color="#c99b42"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1c2b36" flood-opacity="0.20"/>
    </filter>
    <clipPath id="domeclip">
      <path d="M 452 258 C 452 128 688 128 688 258 L 688 262 L 452 262 Z"/>
    </clipPath>
  </defs>

  <!-- plate -->
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- pilcrow -->
  <g fill="#1273b8">
    <path d="M 546 250 L 546 520 C 400 520 330 458 330 385 C 330 312 400 250 546 250 Z"/>
    <rect x="504" y="250" width="44" height="420" rx="4"/>
    <rect x="590" y="250" width="44" height="420" rx="4"/>
    <rect x="504" y="250" width="130" height="38" rx="4"/>
  </g>

  <!-- ruled lines -->
  <g stroke="#a9d9e8" stroke-width="16" stroke-linecap="round" fill="none">
    <line x1="252" y1="742" x2="772" y2="742"/>
    <line x1="252" y1="798" x2="772" y2="798"/>
    <line x1="252" y1="854" x2="656" y2="854"/>
  </g>

  <!-- straw hat, slightly tilted -->
  <g transform="rotate(-8 570 246)">
    <!-- dome -->
    <path d="M 452 258 C 452 128 688 128 688 258 L 688 262 L 452 262 Z" fill="url(#straw)"/>
    <!-- red band -->
    <rect x="440" y="196" width="260" height="66" fill="#cf3a2f" clip-path="url(#domeclip)"/>
    <!-- brim -->
    <ellipse cx="570" cy="262" rx="196" ry="42" fill="url(#brim)"/>
    <!-- brim top highlight -->
    <ellipse cx="570" cy="256" rx="182" ry="34" fill="#eec865" opacity="0.85"/>
  </g>
</svg>
